<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FABIE - Simulateur Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>🏭 Accès FABIE</h2>
            <input type="text" id="username" placeholder="Identifiant">
            <input type="password" id="password" placeholder="Mot de passe">
            <button onclick="app.login()">Connexion</button>
            <p id="login-msg">Mot de passe incorrect</p>
        </div>
    </div>

    <div id="main-interface" style="display:none;">
        <nav class="navbar">
            <div class="brand">Simulateur <span>FABIE</span></div>
            <div class="user-info">
                <span id="user-display">Invité</span>
                <button class="btn-logout" onclick="location.reload()">Quitter</button>
            </div>
        </nav>

        <div class="layout">
            <aside class="sidebar-left">
                <div class="panel">
                    <h3>📂 Scénarios</h3>
                    <div class="controls">
                        <button onclick="app.createScenario()" class="btn-new">+ Nouveau</button>
                        <button onclick="app.downloadJSON()" title="Sauvegarder fichier">💾</button>
                        <button onclick="document.getElementById('file-upload').click()" title="Ouvrir fichier">📂</button>
                        <input type="file" id="file-upload" hidden onchange="app.uploadJSON(this)">
                    </div>
                    <div id="scenario-list" class="list-box"></div>
                </div>

                <div class="panel">
                    <h3>🏭 Mes Ateliers</h3>
                    <div id="workshop-list" class="list-box workshops"></div>
                    <button onclick="app.addWorkshop()" class="btn-add-ws">+ Ajouter Atelier</button>
                </div>
            </aside>

            <main class="viewport">
                <div class="toolbar">
                    <div class="dims">
                        Dim: <input type="number" id="ws-width" value="20" onchange="app.resizeRoom()"> x 
                        <input type="number" id="ws-height" value="12" onchange="app.resizeRoom()"> m
                    </div>
                    <div class="tools">
                        <button onclick="app.addItem('machine')">🏭 Machine</button>
                        <button onclick="app.addItem('palette')">📦 Palette</button>
                        <button onclick="app.addItem('scale')">🪜 Échelle</button>
                        <button onclick="app.addItem('pillar')">⬛ Pilier</button>
                        <button onclick="app.addItem('waypoint')">📍 Point</button>
                    </div>
                    <button onclick="app.addOperator()" class="btn-op">👷 Opérateur</button>
                    <div id="trash" class="trash-zone">🗑️ Corbeille</div>
                </div>

                <div id="canvas-area">
                    <div id="grid"></div>
                    <svg id="svg-layer"></svg>
                    <div id="items-layer"></div>
                </div>
            </main>

            <aside class="sidebar-right">
                <div class="panel">
                    <h3>⚙️ Gammes Opératoires</h3>
                    <div id="operators-list" class="op-list"></div>
                </div>
                <div class="panel stats">
                    <h3>📊 Coûts & Temps</h3>
                    <div class="global-param">
                        Temps Ref: <input type="number" id="ref-hours" value="7" onchange="app.updateStats()"> h
                    </div>
                    <div id="stats-display"></div>
                </div>
            </aside>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
