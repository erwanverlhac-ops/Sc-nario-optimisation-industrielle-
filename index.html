<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Atelier FABIE - Advanced</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --grid-color: #cccccc;
            --wall-color: #333;
            --box-bg: #3498db;
            --box-border: #2980b9;
            --palette-bg: #d35400;
            --scale-bg: #27ae60;
            --waypoint-bg: #8e44ad;
            --pillar-bg: #000000;
            --accent: #e74c3c;
            --text: #2c3e50;
            --scale: 30px; 
            --room-w: 19.9;  
            --room-h: 11.74; 
            --panel-width: 320px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- ECRAN DE CONNEXION --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95);
            z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 8px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 300px;
        }
        .login-box h2 { margin-top: 0; color: #333; }
        .login-box input {
            width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;
            border: 1px solid #ddd; border-radius: 4px; font-size: 16px;
        }
        .login-box button {
            width: 100%; padding: 10px; background: var(--box-bg); color: white;
            border: none; border-radius: 4px; font-size: 16px; cursor: pointer;
        }
        .login-box button:hover { background: var(--box-border); }
        .error-msg { color: var(--accent); font-size: 14px; margin-top: 10px; display: none; }

        /* --- WRAPPER PRINCIPAL --- */
        .main-wrapper {
            display: flex; flex: 1; overflow: hidden; width: 100%;
            filter: blur(5px); /* Flou tant que pas connecté */
            pointer-events: none;
            transition: filter 0.3s;
        }

        /* --- SCENARIO BAR --- */
        .scenario-bar {
            background: #2c3e50; color: white; padding: 8px 15px; display: flex;
            justify-content: space-between; align-items: center; font-size: 14px;
        }
        .scenario-controls { display: flex; gap: 10px; }
        .scenario-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
            display: flex; align-items: center; gap: 5px;
        }
        .scenario-btn:hover { background: rgba(255,255,255,0.2); }
        .file-input { display: none; }

        /* --- PANNEAU DU BAS (CONFIG) --- */
        .bottom-panel {
            height: 280px; background: white; border-top: 1px solid #ddd;
            display: flex; flex-direction: column;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.05); z-index: 20; flex-shrink: 0; width: 100%;
        }
        .bottom-panel.collapsed { display: none; }

        /* --- COLONNE CENTRALE (ATELIER) --- */
        .main-content {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 10px; overflow-y: auto; position: relative; background: #f4f7f6;
        }

        /* --- COLONNE DROITE (STATS) --- */
        .stats-sidebar {
            width: var(--panel-width); background: white; border-left: 1px solid #ddd;
            display: flex; flex-direction: column;
            box-shadow: -2px 0 5px rgba(0,0,0,0.05); z-index: 20; flex-shrink: 0;
            display: none; height: 100vh; overflow-y: auto;
        }

        header { text-align: center; margin-bottom: 10px; flex-shrink: 0; }
        h1 { font-size: 1.3rem; margin: 5px 0; color: var(--text); font-weight: 600; }

        /* BANNIÈRE CONTROLS */
        .top-bar {
            background: white; padding: 8px 15px; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px;
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
            align-items: center; position: relative; z-index: 100; width: fit-content; flex-shrink: 0;
        }

        .trash-zone {
            display: flex; align-items: center; justify-content: center;
            background-color: #ffebee; border: 2px dashed #e57373; color: #c62828;
            padding: 5px 15px; border-radius: 5px; font-weight: bold;
